<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Janpath by SLOW PRESS and saumya ke jalwe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #10113B;      /*black table base  */
    --bg-darker: #141111;    /* for shadows and vignette */
    --accent-blue: #4555A2;  /* primary accent */
    --accent-red: #B72825;   /* hover / close button */
    --paper: #f5f0e8;
    --ink: #1c1814;
  }
  /* remember this is similiar to js ke const idhar apun ek variable bana rha hai css mein*/

  @font-face {
    font-family: 'Schoolbook', serif;
    src: url('fonts/SCHLBKB.woff2') format('woff2');
}

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-dark);
    overflow: hidden;
    font-family: 'Schoolbook', serif;
    cursor: default;
  }

  /* ── WOOD TABLE reimagined with new palette ── */
  #table {
    width: 100%; height: 100%;
    position: relative;
    background-color: var(--bg-dark);
    background-image:
      repeating-linear-gradient(
        92deg,
        transparent 0px, transparent 18px,
        rgba(69,85,162,0.08) 18px, rgba(69,85,162,0.08) 19px
      ),
      repeating-linear-gradient(
        178deg,
        transparent 0px, transparent 60px,
        rgba(20,17,17,0.3) 60px, rgba(20,17,17,0.3) 61px
      ),
      radial-gradient(ellipse at 30% 40%, var(--accent-blue) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, var(--bg-darker) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #0a0b2a 0%, var(--bg-dark) 100%);
    overflow: hidden;
  }

  /* subtle vignette using new dark color */
  #table::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--bg-darker) 100%);
    pointer-events: none;
    z-index: 100;
  }

  /* ── A4 LANDSCAPE PAGE ── */
  .page {
    position: absolute;
    width: 240px;
    height: 170px;
    background: var(--paper);
    box-shadow:
      0 6px 12px rgba(0,0,0,0.5),
      0 18px 36px rgba(0,0,0,0.4),
      inset 0 0 0 1px rgba(255,255,255,0.1);
    cursor: pointer;
    transform-origin: center center;
    transition:
      transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1),
      z-index 0s;
    z-index: 1;
    overflow: hidden;
    will-change: transform;
    user-select: none;
  }

  .page:hover {
    box-shadow:
      0 25px 60px rgba(0,0,0,0.8),
      0 8px 20px rgba(0,0,0,0.5),
      inset 0 0 0 2px var(--accent-red);
    z-index: 50;
  }

  .page-inner {
    width: 100%; height: 100%;
    overflow: hidden;
    position: relative;
  }

  .page-inner svg, .page-inner img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
  }

  /* ── LIGHTBOX (centered large view) ── */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(16,17,59,0.94);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  #lightbox-page {
    width: min(85vh, 95vw);
    height: calc(min(85vh, 95vw) / 1.414);
    background: var(--paper);
    box-shadow: 0 40px 120px rgba(0,0,0,0.9), 0 0 0 2px var(--accent-blue);
    overflow: hidden;
    position: relative;
    transform: scale(0.92);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    border-radius: 2px;
  }

  #overlay.active #lightbox-page {
    transform: scale(1);
  }

  #lightbox-content {
    width: 100%; height: 100%;
  }

  #close-btn {
    position: absolute;
    top: 24px; right: 28px;
    width: 44px; height: 44px;
    border: 1px solid var(--accent-blue);
    background: rgba(69,85,162,0.15);
    color: var(--accent-blue);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: -1px;
    transition: background 0.2s, border-color 0.2s;
    z-index: 10;
    font-family: 'Schoolbook', serif;
    font-weight: 300;
  }
  #close-btn:hover {
    background: var(--accent-red);
    border-color: var(--accent-red);
    color: white;
  }

  #page-label {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: var(--accent-blue);
    font-family: 'Schoolbook', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: rgba(20,17,17,0.6);
    padding: 4px 12px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
<div id="table"></div>

<!-- Lightbox overlay -->
<div id="overlay">
  <button id="close-btn">✕</button>
  <div id="lightbox-page">
    <div id="lightbox-content"></div>
  </div>
  <div id="page-label"></div>
</div>

<script>
// 
// spreads by janpath slow press each locally placed by zuki ehehehehe waaaaaaaaaah
// 
const PAGES = [
  { label: "Tile & Mural Wall", bg: "#1c1814", svg: `<div style="width:100%; height:100%;"> <img src="assests ehhee/01 - tile wall.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Hill Quiro", bg: "#f5f0e8", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/02 - hill quiro.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Doma", bg: "#d4874a", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/03 - doma.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Mingma", bg: "#f5f0e8", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/04 - mingma.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Lama Art House", bg: "#e8e0d2", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/05 - lama.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Northern Art Centre", bg: "#1c1814", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/06- northern art centre.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Central Cottage Emporium", bg: "#f5f0e8", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/07 cottage.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Popli Brass", bg: "#e8eae0", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/09 - popli.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Jewellery Stall", bg: "#f0ece4", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/10 - jewellery.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Paan Wale Uncle", bg: "#0e0a06", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/11 - paan wale uncle.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Gujrati Lane", bg: "#f5f0e8", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/13 - gujrati lane.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Tulip Overseas", bg: "#f0ece4", svg: `<div style="width:100%; height:100%; "><img src="assests ehhee/12 - tulip overseas.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Pratap Florist", bg: "#faf6ee", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/14 - florist.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Janpath Main Market", bg: "#e₀d₈c₈", svg: `<div style="width:100%; height:100%;"><img src="assests ehhee/16 - janpath main market.png" style="width:100%; height:100%; object-fit: cover;"></div>` },
  { label: "Murti Wale Uncle", bg: "#₁c₁₈₁₄", svg: `<div style="width: "１₀₀％"; height: "100％";"><img src="assests ehhee/18 - murti wale uncle.png" style="width:"₁₀₀％"; height:"₁₀₀％"; object-fit:" cover";"></div>` }
];

// bikhari hui chijein
const table = document.getElementById('table');
const overlay = document.getElementById('overlay');
const lightboxContent = document.getElementById('lightbox-content');
const closeBtn = document.getElementById('close-btn');
const pgLabel = document.getElementById('page-label');

const scatterPos = [
  { x: 22, y: 18, r: -13 }, { x: 42, y: 12, r:  9 }, { x: 60, y: 22, r: -7 }, { x: 78, y: 15, r: 16 },
  { x: 30, y: 38, r: -5 }, { x: 50, y: 44, r: 11 }, { x: 70, y: 36, r: -12 }, { x: 88, y: 48, r:  8 },
  { x: 18, y: 62, r:  6 }, { x: 38, y: 70, r: -16 }, { x: 58, y: 66, r: 13 }, { x: 78, y: 58, r: -9 },
  { x: 26, y: 84, r: 10 }, { x: 46, y: 78, r: -14 }, { x: 68, y: 88, r:  5 }, { x: 85, y: 76, r: -8 }
];

PAGES.forEach((page, idx) => {
  const el = document.createElement('div');
  el.className = 'page';
  el.dataset.index = idx;
  const pos = scatterPos[idx];
  const baseTransform = `translate(-50%, -50%) rotate(${pos.r}deg)`;
  el.style.left = `${pos.x}%`;
  el.style.top = `${pos.y}%`;
  el.style.transform = baseTransform;
  
  const inner = document.createElement('div');
  inner.className = 'page-inner';
  inner.innerHTML = page.svg;
  el.appendChild(inner);
  
  el.addEventListener('mouseenter', () => {
    el.style.transform = `translate(-50%, -50%) rotate(${pos.r * 0.2}deg) scale(1.18) translateY(-10px)`;
    el.style.zIndex = 50;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = baseTransform;
    el.style.zIndex = 1;
  });
  
  el.addEventListener('click', () => openLightbox(idx));
  table.appendChild(el);
});

function openLightbox(i) {
  const page = PAGES[i];
  lightboxContent.innerHTML = page.svg;
  // if an image is inside a div, no need to adjust SVG; but if any SVG remains, handle
  const svg = lightboxContent.querySelector('svg');
  if (svg) {
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  }
  pgLabel.textContent = `${String(i+1).padStart(2,'0')} / 16 — ${page.label}`;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeLightbox);
overlay.addEventListener('click', e => { if (e.target === overlay) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
